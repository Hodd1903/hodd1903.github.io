<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Simple Shop</title>
  <style>
    body { margin:0; font-family: Arial, sans-serif; background:#f4f4f4; }
    header { background:#222; color:#fff; padding:15px; text-align:center; }
    nav { background:#444; padding:10px; text-align:center; }
    nav a { color:#fff; margin:0 10px; text-decoration:none; font-weight:bold; }
    .container { padding:20px; display:flex; flex-wrap:wrap; justify-content:center; }
    .product { background:#fff; width:220px; margin:10px; padding:15px; border-radius:10px; box-shadow:0 2px 5px rgba(0,0,0,0.1); text-align:center; }
    .product img { width:100%; border-radius:10px; }
    button { margin-top:10px; padding:10px; border:none; background:#222; color:#fff; border-radius:5px; cursor:pointer; }
    button:hover { background:#555; }
    #cart { position:fixed; right:10px; top:80px; background:#fff; padding:15px; border-radius:10px; width:200px; box-shadow:0 2px 5px rgba(0,0,0,0.2); }
  </style>
</head>
<body>

<header>
  <h1>My Shop</h1>
  <p>Simple Online Store</p>
</header>

<nav>
  <a href="#">Home</a>
</nav>

<div id="cart">
  <h3>Cart</h3>
  <ul id="cart-items"></ul>
</div>

<div class="container">

  <div class="product">
    <img src="https://via.placeholder.com/200" alt="Product">
    <h3>Product 1</h3>
    <p>$10</p>
    <button onclick="addToCart('Product 1')">Add</button>
  </div>

  <div class="product">
    <img src="https://via.placeholder.com/200" alt="Product">
    <h3>Product 2</h3>
    <p>$15</p>
    <button onclick="addToCart('Product 2')">Add</button>
  </div>

  <div class="product">
    <img src="https://via.placeholder.com/200" alt="Product">
    <h3>Product 3</h3>
    <p>$20</p>
    <button onclick="addToCart('Product 3')">Add</button>
  </div>

</div>

<script>
  function addToCart(product) {
    const list = document.getElementById('cart-items');
    const item = document.createElement('li');
    item.textContent = product;
    list.appendChild(item);
  }
</script>

</body>
</html>
